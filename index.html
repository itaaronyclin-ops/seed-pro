    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            background: #f8fafc;
            scroll-behavior: smooth;
        }

        /* Enhanced Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }

        .glass-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.85) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.08);
        }

        /* === DESIGN TOKENS === */
        :root {
            --blue-primary: #2563eb;
            --blue-dark: #1e40af;
            --indigo: #4f46e5;
            --cyan: #06b6d4;
        }

        .gradient-text {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #06b6d4 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% 200%;
            animation: gradientMove 5s ease infinite;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* === HERO SECTION === */
        .hero-section {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 40%, #1e3a8a 100%);
            position: relative;
            overflow: hidden;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: -40%;
            left: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: floatOrb 8s ease-in-out infinite;
        }

        .hero-section::after {
            content: '';
            position: absolute;
            bottom: -30%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.25) 0%, transparent 70%);
            border-radius: 50%;
            animation: floatOrb 10s ease-in-out infinite reverse;
        }

        @keyframes floatOrb {

            0%,
            100% {
                transform: translateY(0px) scale(1);
            }

            50% {
                transform: translateY(-30px) scale(1.05);
            }
        }

        .hero-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 6px 16px;
            border-radius: 100px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .hero-badge .dot {
            width: 8px;
            height: 8px;
            background: #22d3ee;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(0.8);
            }
        }

        /* === MAIN CONTENT AREA === */
        .events-bg {
            background: #f8fafc;
            min-height: 60vh;
        }

        /* === PREMIUM CARD === */
        .event-card {
            background: #ffffff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .event-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 24px 60px rgba(37, 99, 235, 0.15);
            border-color: rgba(147, 197, 253, 0.6);
        }

        .event-card:hover .card-img {
            transform: scale(1.08);
        }

        .card-img {
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* === GLASS NAVBAR === */
        .glass {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 1px 40px rgba(0, 0, 0, 0.06);
        }

        .glass-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        /* === SCROLL FADE ANIMATIONS === */
        [data-aos] {
            transition-duration: 0.6s !important;
        }

        /* === SECTION TRANSITIONS === */
        .view-section {
            animation: fadeSlideIn 0.4s ease;
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* === BUTTON STYLES === */
        .btn-primary {
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            color: white;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s;
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.35);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 32px rgba(37, 99, 235, 0.45);
        }

        .btn-primary:active {
            transform: scale(0.97);
        }
    </style>
</head>

            <div class="bg-white p-10 rounded-3xl shadow-xl border border-slate-100">
                <h2 class="text-3xl font-bold text-slate-800 mb-2 text-center">查詢報名狀態</h2>
                <p class="text-center text-slate-400 mb-8">輸入資訊以查詢您的報名狀態與報到 QR Code</p>
                <form id="check-form" class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Email 或 手機</label>
                        <input type="text" id="check-query" placeholder="e.g. user@example.com" required
                            class="w-full p-4 bg-slate-50 border-0 rounded-xl focus:ring-2 focus:ring-blue-500 transition-all outline-none">
                    </div>
                    <button type="submit"
                        class="w-full bg-slate-900 text-white py-4 rounded-xl hover:bg-black font-bold text-lg transition-transform transform active:scale-95 shadow-lg">查詢
                        Search</button>
                </form>

                <div id="check-results" class="mt-8 space-y-4 text-center"></div>
            </div>
        </div>

    </div>

    <!-- Notifications replaced smoothly by SweetAlert2 -->

    <script>
        // DOM Elements
        const loadingSpinner = document.getElementById('loading');
        const form = document.getElementById('registration-form');
        const mainHeader = document.getElementById('main-header');

        const Toast = Swal.mixin({
            toast: true,
            position: "bottom-end",
            showConfirmButton: false,
            timer: 3000,
            timerProgressBar: true,
            customClass: { popup: 'rounded-xl shadow-xl' },
            didOpen: (toast) => {
                toast.addEventListener('mouseenter', Swal.stopTimer)
                toast.addEventListener('mouseleave', Swal.resumeTimer)
            }
        });

        function showSection(section) {
            const allViews = ['view-events', 'view-details', 'view-register', 'view-check'];
            // Remove animation classes and hide all views
            allViews.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.classList.add('hidden');
                    el.classList.remove('animate__animated', 'animate__fadeIn', 'animate__fadeInUp', 'animate__zoomIn');
                }
            });

            const target = document.getElementById(`view-${section}`);
            if (!target) return;
            target.classList.remove('hidden');

            // Apply appropriate animation
            if (section === 'events') {
                mainHeader.style.display = 'block';
            } else if (section === 'details') {
                mainHeader.style.display = 'none';
                target.classList.add('animate__animated', 'animate__fadeIn');
            } else if (section === 'register') {
                mainHeader.style.display = 'none';
                target.classList.add('animate__animated', 'animate__fadeInUp');
            } else if (section === 'check') {
                mainHeader.style.display = 'none';
                target.classList.add('animate__animated', 'animate__zoomIn');
            } else {
                mainHeader.style.display = 'none';
            }

            // Instant scroll for responsiveness (no lag)
            window.scrollTo({ top: 0, behavior: 'instant' });
        }

        // Fetch Events on Load
        window.addEventListener('DOMContentLoaded', async () => {
            if (!API_URL || API_URL.includes("REPLACE")) {
                Swal.fire({ icon: 'warning', title: '尚未設定 API', text: '請在 config.js 中設定 API_URL (Google Apps Script Deployment URL)' });
                return;
            }

            try {
                const response = await fetch(`${API_URL}?action=getEvents&_t=${Date.now()}`);
                const result = await response.json();

                loadingSpinner.classList.add('hidden');
                // Default show events
                if (result.status === 'success' && result.data.length > 0) {
                    window.allEvents = result.data; // Store globally
                    renderEvents(result.data.filter(e => e.status !== 'Draft'));
                    document.getElementById('view-events').classList.remove('hidden');
                } else {
                    document.getElementById('view-events').innerHTML = `<p class="col-span-full text-center text-slate-500 glass-card p-10 rounded-2xl font-medium tracking-wide">目前沒有開放的活動。</p>`;
                    document.getElementById('view-events').classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error:', error);
                loadingSpinner.classList.add('hidden');
                Swal.fire({ icon: 'error', title: '連線錯誤', text: '載入活動失敗，請稍後再試。' });
            }
        });

        // Check Registration Logic
        document.getElementById('check-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = document.getElementById('check-query').value;
            const resDiv = document.getElementById('check-results');
            resDiv.innerHTML = '<p class="text-center text-gray-500">查詢中...</p>';

            try {
                // Determine if query looks like email
                let param = query.includes('@') ? `email=${query}` : `phone=${query}`;
                const res = await fetch(`${API_URL}?action=getMyRegistrations&${param}`);
                const json = await res.json();

                if (json.status === 'success' && json.data.length > 0) {
                    resDiv.innerHTML = json.data.map(r => {
                        let qrBlock = '';
                        // Default true if undefined, strictly check for false
                        const showQr = r.event_enable_qr !== false;

                        if (r.qr_code_data && showQr) {
                            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(r.qr_code_data)}`;

                            if (r.check_in_status === 'CheckedIn') {
                                // Checked In State
                                qrBlock = `
                                    <div class="mt-2 text-center relative border-t-2 border-dashed border-slate-200 pt-6 pb-2">
                                        <div class="absolute inset-0 top-6 bg-white/70 flex items-center justify-center z-10 backdrop-blur-[2px] rounded-b-xl">
                                            <div class="bg-white px-5 py-2.5 rounded-xl shadow-xl border border-green-100 transform rotate-[-10deg]">
                                                <span class="text-green-600 font-black text-xl tracking-wider">
                                                    <i class="fas fa-stamp mr-1.5"></i> 已報到
                                                </span>
                                            </div>
                                        </div>
                                        <img src="${qrUrl}" class="mx-auto w-32 h-32 opacity-20 grayscale" alt="QR Code">
                                        <p class="text-[10px] text-slate-400 mt-3 font-bold uppercase tracking-widest text-center">失效 INVALID</p>
                                    </div>
                                `;
                            } else {
                                // Normal State
                                qrBlock = `
                                    <div class="mt-2 text-center border-t-2 border-dashed border-slate-200 pt-5 pb-2">
                                        <p class="text-xs text-blue-600 font-black tracking-widest uppercase mb-3"><i class="fas fa-qrcode mr-1"></i> 請出示條碼 SCAN ME</p>
                                        <img src="${qrUrl}" class="mx-auto w-40 h-40 p-2.5 bg-white border border-slate-200 rounded-2xl shadow-sm" alt="QR Code">
                                    </div>
                                `;
                            }
                        } else if (r.qr_code_data && !showQr) {
                            qrBlock = `
                                 <div class="mt-2 text-center border-t-2 border-dashed border-slate-200 pt-5 pb-2">
                                     <p class="text-sm text-slate-400 font-bold mb-2"><i class="fas fa-lock mr-1.5"></i> QR Code 尚未開放顯示</p>
                                 </div>
                             `;
                        } else {
                            qrBlock = `
                                 <div class="mt-2 text-center border-t-2 border-dashed border-slate-200 pt-5 pb-2">
                                     <p class="text-sm text-slate-400 font-bold mb-2">無 QR Code</p>
                                 </div>
                             `;
                        }

                        let statusColor = 'text-yellow-600';
                        if (r.status === 'Approved') statusColor = 'text-green-600';
                        if (r.status === 'Rejected') statusColor = 'text-red-600';

                        // Extract name and phone robustly
                        let nameStr = r.participant_name || r.name || '目前無姓名資料';
                        let phoneStr = r.phone || '無電話';

                        try {
                            if (r.dynamic_data) {
                                let fd = typeof r.dynamic_data === 'string' ? JSON.parse(r.dynamic_data) : r.dynamic_data;
                                if (fd.name) nameStr = fd.name;
                                else if (fd['姓名']) nameStr = fd['姓名'];

                                if (fd.phone) phoneStr = fd.phone;
                                else if (fd['電話']) phoneStr = fd['電話'];
                                else if (fd['聯絡電話']) phoneStr = fd['聯絡電話'];
                            }
                        } catch (e) { }

                        // ID Badge HTML
                        return `
                            <div class="relative bg-white max-w-sm mx-auto rounded-2xl shadow-[0_10px_40px_-15px_rgba(0,0,0,0.15)] border border-slate-200 overflow-hidden transform transition-all hover:-translate-y-1 my-8">
                                
                                <!-- Lanyard simulation -->
                                <div class="absolute top-0 left-1/2 -translate-x-1/2 -mt-1 w-20 h-5 bg-slate-50/20 rounded-b-3xl border-b border-l border-r border-white/20 shadow-inner flex justify-center items-end pb-1.5 z-20 backdrop-blur-sm">
                                    <div class="w-10 h-1.5 bg-slate-300/80 rounded-full"></div>
                                </div>
                                
                                <!-- Header / Brand Color -->
                                <div class="bg-gradient-to-br from-blue-600 to-indigo-700 text-white pt-10 pb-8 px-6 text-center relative">
                                    <div class="absolute top-0 left-0 w-full h-full opacity-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-repeat"></div>
                                    <h3 class="font-black text-2xl tracking-tight leading-tight relative text-shadow-sm">${r.event_name || '活動通行證'}</h3>
                                    <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-8 h-1 bg-white/30 rounded-t-lg"></div>
                                </div>
                                
                                <div class="p-6">
                                    <!-- Participant Name & Phone -->
                                    <div class="text-center mb-6">
                                        <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest mb-1">PARTICIPANT / 參加者</p>
                                        <h4 class="text-2xl font-black text-slate-800 tracking-wide">${nameStr}</h4>
                                        <p class="text-slate-500 font-medium mt-1 mb-2"><i class="fas fa-phone-alt text-slate-400 mr-1.5 text-xs"></i>${phoneStr}</p>
                                    </div>
                                    
                                    <!-- Status Grid -->
                                    <div class="grid grid-cols-2 gap-3 mb-5">
                                        <div class="bg-slate-50 p-3.5 rounded-xl border border-slate-100 text-center shadow-sm">
                                            <span class="block text-[10px] text-slate-400 uppercase font-black tracking-widest mb-1.5">報名狀態</span>
                                            <span class="font-black text-sm ${statusColor}">${r.status_tw || r.status}</span>
                                        </div>
                                        <div class="bg-slate-50 p-3.5 rounded-xl border border-slate-100 text-center shadow-sm">
                                            <span class="block text-[10px] text-slate-400 uppercase font-black tracking-widest mb-1.5">付款狀態</span>
                                            <span class="font-black text-sm text-slate-700">${r.payment_status}</span>
                                        </div>
                                    </div>
                                    
                                    <!-- Event Info Details -->
                                    <div class="space-y-3 mb-6 bg-blue-50/50 p-4 rounded-xl border border-blue-100/50">
                                        <div class="flex items-start text-xs text-slate-600">
                                            <div class="w-6 h-6 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center mr-3 shrink-0"><i class="fas fa-calendar-alt mt-0.5"></i></div>
                                            <span class="font-bold text-slate-700 mt-1">${new Date(r.event_date).toLocaleDateString()}</span>
                                        </div>
                                        <div class="flex items-start text-xs text-slate-600">
                                            <div class="w-6 h-6 rounded-full bg-red-100 text-red-500 flex items-center justify-center mr-3 shrink-0"><i class="fas fa-map-marker-alt mt-0.5"></i></div>
                                            <span class="font-bold text-slate-700 leading-relaxed mt-0.5 line-clamp-2">${r.event_location}</span>
                                        </div>
                                    </div>
                                    
                                    <!-- QR Code Zone -->
                                    ${qrBlock}
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    resDiv.innerHTML = '<p class="text-center text-slate-500 py-8">查無相關報名資料，請確認輸入資訊是否正確。</p>';
                }
            } catch (e) {
                console.error(e);
                resDiv.innerHTML = '<p class="text-center text-red-500">查詢發生錯誤，請稍後再試。</p>';
            }
        });

        // --- Event Rendering ---
        const eventsContainer = document.getElementById('view-events'); // Start with this hidden or empty, filled by JS

        async function fetchEvents() {
            document.getElementById('loading').classList.remove('hidden');
            try {
                const response = await fetch(`${API_URL}?action=getEvents&_t=${Date.now()}`);
                const result = await response.json();
                if (result.status === 'success') {
                    window.allEvents = result.data;
                    renderEvents(result.data.filter(e => e.status !== 'Draft')); // Show only published
                    document.getElementById('view-events').classList.remove('hidden');
                } else {
                    document.getElementById('view-events').innerHTML = '<p class="text-center text-slate-500 col-span-full">無法載入活動 (API Error)</p>';
                    document.getElementById('view-events').classList.remove('hidden');
                }
            } catch (error) {
                console.error("Error:", error);
                eventsContainer.innerHTML = '<p class="text-center text-red-500 col-span-full">無法載入活動，請稍後再試。</p>';
            } finally {
                document.getElementById('loading').classList.add('hidden');
                if (!document.getElementById('view-details').classList.contains('hidden') || !document.getElementById('view-register').classList.contains('hidden') || !document.getElementById('view-check').classList.contains('hidden')) {
                    // do nothing if on other page
                } else {
                    showSection('events');
                }
            }
        }

        function renderEvents(events) {
            const header = document.getElementById('events-section-header');
            if (header) header.style.display = events.length > 0 ? '' : 'none';

            eventsContainer.innerHTML = events.map((event, index) => {
                let imgScr = event.image_url || 'https://images.unsplash.com/photo-1540575467063-178a50c2df87?auto=format&fit=crop&q=80&w=800';
                if (imgScr.includes('dropbox.com')) {
                    imgScr = imgScr.replace('?dl=0', '?raw=1').replace('www.dropbox.com', 'dl.dropboxusercontent.com');
                }

                return `
                <div class="event-card" 
                     onclick="showEventDetails('${event.event_id}')"
                     data-aos="fade-up" data-aos-delay="${index * 80}">
                    <!-- Card Image -->
                    <div class="h-52 overflow-hidden relative flex-shrink-0">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-900/50 to-transparent z-10"></div>
                        <img src="${imgScr}" 
                             alt="${event.name}" class="card-img w-full h-full object-cover">
                        <span class="absolute top-4 right-4 z-20 px-3 py-1.5 bg-white/95 backdrop-blur-md text-blue-700 text-xs font-extrabold rounded-full shadow-lg uppercase tracking-wider">
                            ${Number(event.price) === 0 ? '免費' : '$' + event.price}
                        </span>
                        <span class="absolute bottom-4 left-4 z-20 px-2 py-1 bg-blue-600/90 backdrop-blur-md text-white text-xs font-bold rounded-lg">
                            <i class="far fa-calendar-alt mr-1"></i>${new Date(event.date).toLocaleDateString('zh-TW')}
                        </span>
                    </div>
                    <!-- Card Body -->
                    <div class="p-6 flex-grow flex flex-col">
                        <h3 class="text-xl font-bold text-slate-800 mb-2 line-clamp-1 group-hover:text-blue-600 transition-colors">${event.name}</h3>
                        <p class="text-slate-500 text-sm mb-4 line-clamp-2 leading-relaxed flex-1">${event.description || '暫無描述'}</p>
                        <div class="flex items-center text-slate-400 text-xs mb-5 font-medium">
                            <i class="fas fa-map-marker-alt mr-1.5 text-slate-300"></i>
                            <span class="truncate">${event.location}</span>
                        </div>
                        <button onclick="event.stopPropagation(); showRegisterFormByEventId('${event.event_id}')"
                            class="w-full btn-primary py-3 text-sm mt-auto">
                            <i class="fas fa-ticket-alt mr-1.5"></i> 立即報名
                        </button>
                    </div>
                </div>
                `;
            }).join('');
        }

        // ====== showEventDetails (Event Detail Page) ======
        function showEventDetails(eventId) {
            selectedEvent = (window.allEvents || []).find(e => String(e.event_id) === String(eventId));
            if (!selectedEvent) return;

            const event = selectedEvent;

            // --- Poster image (supports Dropbox: change ?dl=0 to ?raw=1) ---
            let imageUrl = event.image_url || '';
            if (imageUrl.includes('dropbox.com')) {
                imageUrl = imageUrl.replace('?dl=0', '?raw=1').replace('www.dropbox.com', 'dl.dropboxusercontent.com');
            }
            const imgEl = document.getElementById('detail-image');
            if (imageUrl) {
                imgEl.src = imageUrl;
                imgEl.style.display = 'block';
            } else {
                imgEl.src = 'https://images.unsplash.com/photo-1540575467063-178a50c2df87?auto=format&fit=crop&q=80&w=1200';
            }

            // --- Title & basic info ---
            document.getElementById('detail-name').innerText = event.name || '未知活動';

            const dateStr = event.date ? new Date(event.date).toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' }) : '日期未定';
            document.getElementById('detail-date').innerText = dateStr;
            const dateSidebar = document.getElementById('detail-date-sidebar');
            if (dateSidebar) dateSidebar.innerText = dateStr;

            const locStr = event.location || '地點未定';
            document.getElementById('detail-loc').innerText = locStr;
            const locSidebar = document.getElementById('detail-loc-sidebar');
            if (locSidebar) locSidebar.innerText = locStr;

            // --- Description ---
            const descEl = document.getElementById('detail-desc');
            descEl.innerHTML = event.description || '<span class="text-slate-400">暫無活動說明。</span>';

            // --- Price ---
            const priceNum = Number(event.price) || 0;
            const priceText = priceNum === 0 ? '免費 FREE' : `$${priceNum}`;
            document.getElementById('detail-price').innerText = priceNum === 0 ? '免費' : `$${priceNum}`;
            const priceBadge = document.getElementById('detail-price-badge');
            if (priceBadge) priceBadge.innerText = priceText;

            // --- Status badge ---
            const statusBadge = document.getElementById('detail-status-badge');
            if (statusBadge) {
                const statusMap = { 'Open': { text: '開放報名', cls: 'bg-green-500/90' }, 'Full': { text: '已額滿', cls: 'bg-red-500/90' }, 'Closed': { text: '報名截止', cls: 'bg-slate-500/90' }, 'Draft': { text: '草稿', cls: 'bg-yellow-500/90' } };
                const s = statusMap[event.status] || { text: event.status, cls: 'bg-slate-500/90' };
                statusBadge.innerText = s.text;
                statusBadge.className = `px-3 py-1 ${s.cls} backdrop-blur-sm text-white text-xs font-bold rounded-full uppercase tracking-wider`;
            }

            // --- Capacity ---
            const capEl = document.getElementById('detail-capacity');
            if (capEl) {
                capEl.innerText = event.max_capacity ? `${event.max_capacity} 人` : '不限人數';
            }

            // --- Register button state ---
            const regBtn = document.getElementById('btn-go-register');
            if (event.status !== 'Open') {
                regBtn.disabled = true;
                regBtn.classList.add('opacity-50', 'cursor-not-allowed');
                regBtn.classList.remove('hover:-translate-y-1');
                regBtn.innerHTML = `<i class="fas fa-ban mr-2"></i> 報名已截止`;
            } else {
                regBtn.disabled = false;
                regBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                regBtn.classList.add('hover:-translate-y-1');
                regBtn.innerHTML = `<i class="fas fa-ticket-alt mr-2"></i> 立即報名 Join Now`;
            }

            updateMetaTags(event);
            showSection('details');
        }

        function showRegisterFormByEventId(eventId) {
            selectedEvent = window.allEvents.find(e => e.event_id === eventId);
            if (!selectedEvent) return;

            if (selectedEvent.status !== 'Open') {
                Swal.fire({ icon: 'info', title: '報名已截止', text: '此活動目前不開放報名' });
                return;
            }

            document.getElementById('event-id').value = selectedEvent.event_id;
            document.getElementById('reg-form-subtitle').innerText = `正在報名: ${selectedEvent.name}`;
            renderDynamicFields(selectedEvent);
            showSection('register');
        }

        // Load event directly from URL parameter
        async function loadEventAndShowDetails(eventId) {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('view-events').classList.add('hidden');
            document.getElementById('main-header').classList.add('hidden');

            try {
                const response = await fetch(`${API_URL}?action=getEvents&_t=${Date.now()}`);
                const result = await response.json();

                if (result.status === 'success' && result.data) {
                    window.allEvents = result.data;
                    const event = result.data.find(e => String(e.event_id) === String(eventId));

                    if (event) {
                        selectedEvent = event;
                        document.getElementById('loading').classList.add('hidden');
                        showEventDetails(eventId);
                    } else {
                        Swal.fire({ icon: 'error', title: '找不到活動', text: '將為您導回首頁' }).then(() => {
                            window.location.href = 'index.html';
                        });
                    }
                } else {
                    throw new Error('Failed to load event');
                }
            } catch (error) {
                console.error('Error loading event:', error);
                Swal.fire({ icon: 'error', title: '載入失敗', text: '活動載入發生錯誤，將返回首頁' }).then(() => {
                    window.location.href = 'index.html';
                });
            }
        }

        function showRegisterForm() {
            if (!selectedEvent) return;
            document.getElementById('event-id').value = selectedEvent.event_id;
            document.getElementById('reg-form-subtitle').innerText = `正在報名: ${selectedEvent.name}`;
            renderDynamicFields(selectedEvent);
            showSection('register');
        }

        function renderDynamicFields(event) {
            console.log("Rendering Dynamic Fields for:", event.name, "Config:", event.form_config);
            const container = document.getElementById('dynamic-fields-container');
            container.innerHTML = '';
            // Reset standard fields
            document.getElementById('reg-name').value = '';
            document.getElementById('reg-email').value = '';
            document.getElementById('reg-phone').value = '';

            if (event.form_config) {
                try {
                    const fields = typeof event.form_config === 'string' ? JSON.parse(event.form_config) : event.form_config;

                    if (fields && fields.length > 0) {
                        fields.forEach((field, index) => {
                            const div = document.createElement('div');
                            div.className = "space-y-1 animate__animated animate__fadeIn";
                            div.style.animationDelay = `${index * 50}ms`;

                            const label = document.createElement('label');
                            label.className = "text-xs font-bold text-slate-400 uppercase";
                            label.innerHTML = `${field.label} ${field.required ? '<span class="text-red-500">*</span>' : ''}`;

                            let input;

                            if (field.type === 'textarea') {
                                input = document.createElement('textarea');
                                input.rows = 3;
                            } else if (field.type === 'select') {
                                input = document.createElement('select');
                                // Add default option
                                const defaultOpt = document.createElement('option');
                                defaultOpt.value = "";
                                defaultOpt.innerText = "請選擇...";
                                input.appendChild(defaultOpt);

                                if (field.options) {
                                    const opts = field.options.split(',');
                                    opts.forEach(opt => {
                                        const o = document.createElement('option');
                                        o.value = opt.trim();
                                        o.innerText = opt.trim();
                                        input.appendChild(o);
                                    });
                                }
                            } else {
                                input = document.createElement('input');
                                let type = 'text';
                                if (field.type === 'date') type = 'date';
                                if (field.type === 'email') type = 'email';
                                input.type = type;
                            }

                            input.className = "w-full p-4 bg-slate-50 border-0 rounded-xl focus:ring-2 focus:ring-blue-500 transition-all outline-none font-medium text-slate-700 dynamic-field";
                            input.dataset.label = field.label;
                            if (field.required) input.required = true;
                            if (field.type !== 'select' && field.type !== 'date') input.placeholder = field.label;

                            div.appendChild(label);
                            div.appendChild(input);
                            container.appendChild(div);
                        });
                    }
                } catch (e) {
                    console.error("Error parsing form config", e);
                }
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.querySelector('#registration-form button[type="submit"]'); // Corrected selector for submit button
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = '處理中...';

            // Collect Dynamic Data
            let dynamicData = {};
            const container = document.getElementById('dynamic-fields-container');
            const inputs = container.querySelectorAll('input, textarea, select');
            inputs.forEach(input => {
                if (input.dataset.label) {
                    dynamicData[input.dataset.label] = input.value;
                }
            });

            const payload = {
                action: 'register',
                eventId: document.getElementById('event-id').value,
                name: document.getElementById('reg-name').value,
                email: document.getElementById('reg-email').value,
                phone: document.getElementById('reg-phone').value,
                dynamicData: dynamicData
            };

            try {
                // To avoid CORS preflight issues with simple requests, we use text/plain or strict content-type handling in GAS.
                // However, fetch with JSON normally works if GAS is deployed correctly. 
                // We use no-cors mode if strictly needed, but then we can't read response.
                // Standard fetch to GAS Web App usually follows redirects.

                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                    // headers: { "Content-Type": "text/plain;charset=utf-8" } // Helper to avoid rigorous CORS sometimes
                });

                const result = await response.json();

                if (result.status === 'success') {
                    showSection('events');
                    Swal.fire({
                        icon: 'success',
                        title: '報名成功！',
                        text: '請等待審核通知，或隨時以 Email 查詢狀態。',
                        confirmButtonColor: '#3b82f6'
                    });
                } else {
                    Swal.fire({ icon: 'error', title: '報名失敗', text: result.message });
                }
            } catch (error) {
                console.error(error);
                Swal.fire({ icon: 'error', title: '系統錯誤', text: '發生錯誤，請檢查網路連線。' });
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        });

        function showNotification(msg) {
            Toast.fire({ icon: 'success', title: msg });
        }
    </script>
    <script>
        // --- Social Sharing Functions ---
        function shareToFacebook() {
            const url = encodeURIComponent(window.location.href);
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank', 'width=600,height=400');
        }

        function shareToLine() {
            const url = encodeURIComponent(window.location.href);
            window.open(`https://social-plugins.line.me/lineit/share?url=${url}`, '_blank', 'width=600,height=400');
        }

        function copyPageLink() {
            const url = window.location.href;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url).then(() => {
                    Toast.fire({ icon: 'success', title: '✅ 連結已複製到剪貼簿！' });
                }).catch(() => {
                    fallbackCopy(url);
                });
            } else {
                fallbackCopy(url);
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                Toast.fire({ icon: 'success', title: '✅ 連結已複製到剪貼簿！' });
            } catch (err) {
                Swal.fire({ icon: 'error', title: '複製失敗', text: '請手動複製：' + text });
            }
            document.body.removeChild(textarea);
        }

        // --- Update Meta Tags for SEO ---
        function updateMetaTags(event) {
            const pageUrl = window.location.href;
            const eventTitle = `${event.name} | SEED EVENT+`;
            const eventDesc = event.description ? event.description.substring(0, 160) : '立即報名參加精彩活動';

            document.title = eventTitle;
            document.querySelector('meta[name="description"]').setAttribute('content', eventDesc);
            document.querySelector('meta[name="keywords"]').setAttribute('content', `${event.name},活動報名,線上報名,${event.location}`);

            document.querySelector('meta[property="og:type"]').setAttribute('content', 'event');
            document.querySelector('meta[property="og:url"]').setAttribute('content', pageUrl);
            document.querySelector('meta[property="og:title"]').setAttribute('content', eventTitle);
            document.querySelector('meta[property="og:description"]').setAttribute('content', eventDesc);
            if (event.image_url) {
                document.querySelector('meta[property="og:image"]').setAttribute('content', event.image_url);
            }

            document.querySelector('meta[property="twitter:url"]').setAttribute('content', pageUrl);
            document.querySelector('meta[property="twitter:title"]').setAttribute('content', eventTitle);
            document.querySelector('meta[property="twitter:description"]').setAttribute('content', eventDesc);
            if (event.image_url) {
                document.querySelector('meta[property="twitter:image"]').setAttribute('content', event.image_url);
            }
        }

        // --- Check URL Parameters on Page Load ---
        document.addEventListener('DOMContentLoaded', function () {
            const urlParams = new URLSearchParams(window.location.search);
            const eventId = urlParams.get('event') || urlParams.get('id');

            if (eventId) {
                // Load single event and go straight to details
                loadEventAndShowDetails(eventId);
            } else {
                // Load event list as normal
                init();
            }
        });

        AOS.init({ once: true, offset: 80, duration: 500 });
    </script>
</body>
